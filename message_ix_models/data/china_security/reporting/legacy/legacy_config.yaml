report_config:
    table_def: "message_data.tools.post_processing.materials_dac_tables"
    aggr_def: "materials_dac_aggregates.csv"
    var_def: "materials_dac_variable_definitions.csv"
    unit_yaml: 'materials_dac_units.yaml'
    kyoto_hist: False
    lu_hist: False
run_tables:
    Enrgy_PE:
        root: Primary Energy
        active: True
        function: retr_pe
        args: {"units": "EJ/yr"}
    Enrgy_FE:
        root: Final Energy
        active: True
        function: retr_fe
        args: {"units": "EJ/yr"}
    Enrgy_SE_elec:
        root: Secondary Energy|Electricity
        active: True
        function: retr_SE_elecgen
        args: {"units": "EJ/yr"}
    Enrgy_SE_heat:
        root: Secondary Energy|Heat
        active: True
        function: retr_SE_district_heat
        args: {"units": "EJ/yr"}
    Enrgy_SE_syn:
        root: Secondary Energy
        active: True
        function: retr_SE_synfuels
        args: {"units": "EJ/yr"}
    Enrgy_SE_gas:
        root: Secondary Energy|Gases
        active: True
        function: retr_SE_gases
        args: {"units": "EJ/yr"}
    Enrgy_SE_solid:
        root: Secondary Energy|Solids
        active: True
        function: retr_SE_solids
        args: {"units": "EJ/yr"}
    Enrgy_UE_outp:
        root: Useful Energy
        active: True
        function: retr_demands_output
        args: {"units": "EJ/yr"}
    Tec_Invst:
        root: Investment|Energy Supply
        active: True
        function: retr_supply_inv
        args: {"units_energy": "billion US$2010/yr",
               "units_emi": "Mt CO2/yr",
               "units_ene_mdl": "GWa"}
    GDP:
        root: GDP
        active: True
        function: retr_macro
        args: {"units": "billion US$2010/yr",
               "conv_usd": 1.10774}
    Cst:
        root: Cost
        active: True
        function: retr_cost
        condition: scen.var("COST_NODAL_NET").empty
        args: {"units": "billion US$2010/yr",
               "conv_usd": 1.10774}
    Prc:
        root: Price
        active: True
        function: retr_price
        args: {"units_CPrc_co2": "US$2010/tCO2",
               "units_CPrc_co2_outp": "US$2010/t CO2", # Name of units in output file
               "units_energy": "US$2010/GJ",
               "units_energy_outp": "US$2010/GJ",
               "units_CPrc_c": "US$2010/tC",
               "conv_CPrc_co2_to_c": 0.03171,
               "conv_CPrc_co2_to_c": .03154,
               "units_agri": "Index (2020 = 1)",}
